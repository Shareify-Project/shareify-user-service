apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}-config
data:
  DATABASE_PATH: {{ .Values.env.databasePath | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}-secret
type: Opaque
data:
  JWT_SECRET: {{ .Values.env.jwtSecret | b64enc | quote }}
