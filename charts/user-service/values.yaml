imagePullSecrets:
  - name: ghcr-secret
replicaCount: 1
image:
  repository: ghcr.io/shareify-project/shareify-user-service
  pullPolicy: IfNotPresent
  tag: latest
service:
  type: ClusterIP
  port: 8000
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 20m
    memory: 32Mi
persistence:
  size: 1Gi
  storageClass: "csi-standard"
  mountPath: /data
env:
  jwtSecret: "shareify-secret-key-2024"
  databasePath: "/data/users.db"

