replicaCount: 1
image:
  repository: ghcr.io/shareify-project/shareify-user-service
  pullPolicy: Always
  tag: "latest"
imagePullSecrets:
  - name: ghcr-secret
service:
  type: ClusterIP
  port: 80
persistence:
  enabled: true
  storageClass: "nfs-client"
  size: 1Gi
  mountPath: /app/data
resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 16Mi
